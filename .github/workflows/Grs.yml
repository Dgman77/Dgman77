name: Update README stats cards

on:
  schedule:
    - cron: "0 3 * * *"   # runs daily at 3:00 AM UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=Dgman77&show_icons=true&hide_border=true&title_color=1F3864&icon_color=1F3864&text_color=333333
          path: stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=Dgman77&layout=compact&hide_border=true&title_color=1F3864&text_color=333333
          path: top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.svg top-langs.svg
          git diff --staged --quiet || git commit -m "chore: update README stats cards"
          git push
